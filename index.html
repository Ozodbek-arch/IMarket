function saveState() {
  localStorage.setItem('im-cart', JSON.stringify(state.cart));
  localStorage.setItem('im-wishlist', JSON.stringify(state.wishlist));
  localStorage.setItem('im-dark', JSON.stringify(state.darkMode));
}

function loadState() {
  try {
    const c = JSON.parse(localStorage.getItem('im-cart') || '[]');
    const w = JSON.parse(localStorage.getItem('im-wishlist') || '[]');
    const d = JSON.parse(localStorage.getItem('im-dark') || 'false');
    state.cart = c; state.wishlist = w; state.darkMode = d;
  } catch(e) {}
}

// ===== HELPERS =====
function fmt(p) { return new Intl.NumberFormat('uz-UZ').format(p) + " so'm"; }
function discount(p, o) { if (!o || o <= p) return 0; return Math.round(((o - p) / o) * 100); }
function cartTotal() { return state.cart.reduce((s, i) => s + i.product.price * i.quantity, 0); }
function cartCount() { return state.cart.reduce((s, i) => s + i.quantity, 0); }

function navigate(page, opts = {}) {
  state.page = page;
  if (opts.category !== undefined) state.category = opts.category;
  if (opts.product !== undefined) state.product = opts.product;
  state.sidebarOpen = false;
  state.checkoutStep = 'info';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function addToCart(product, color) {
  const exists = state.cart.find(i => i.product.id === product.id);
  if (exists) {
    exists.quantity++;
  } else {
    state.cart.push({ product, quantity: 1, color: color || (product.colors && product.colors[0]) });
  }
  state.addedId = product.id;
  saveState();
  render();
  setTimeout(() => { state.addedId = null; render(); }, 2000);
}

function updateQty(id, delta) {
  const item = state.cart.find(i => i.product.id === id);
  if (item) {
    item.quantity += delta;
    if (item.quantity <= 0) {
      state.cart = state.cart.filter(i => i.product.id !== id);
    }
  }
  saveState();
  render();
}

function removeFromCart(id) {
  state.cart = state.cart.filter(i => i.product.id !== id);
  saveState();
  render();
}

function toggleWishlist(id) {
  if (state.wishlist.includes(id)) {
    state.wishlist = state.wishlist.filter(x => x !== id);
  } else {
    state.wishlist.push(id);
  }
  saveState();
  render();
}

function toggleDark() {
  state.darkMode = !state.darkMode;
  saveState();
  render();
}

function ic(name) { return iconSvg[name] || ''; }

function render() {
  document.documentElement.classList.toggle('dark', state.darkMode);
  const app = document.getElementById('app');
  app.innerHTML = renderLayout();
  attachEvents();
  if (window.lucide) lucide.createIcons();
}

function renderLayout() {
  return `
    ${renderHeader()}
    <div class="flex max-w-7xl mx-auto">
      ${renderSidebar()}
      <main class="flex-1 min-w-0 px-4 py-6 pb-24 lg:pb-8 animate-fade">
        ${renderPage()}

    ${renderMobileNav()}
  `;
}

function renderMobileNav() {
  const cc = cartCount();
  const items = [
    { icon: 'home', label: 'Bosh sahifa', page: 'home' },
    { icon: 'search', label: 'Qidirish', page: 'category', category: 'all' },
    { icon: 'heart', label: 'Sevimli', page: 'profile' },
    { icon: 'cart', label: 'Savat', page: 'cart', badge: cc },
    { icon: 'user', label: 'Profil', page: 'profile' },

  return `
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-zinc-950 border-t border-gray-100 dark:border-zinc-800">
      <div class="flex items-center justify-around h-16">
        ${items.map(item => {
          const active = state.page === item.page;
          return `
            <button onclick="navigate('${item.page}', ${item.category ? `{category:'${item.category}'}` : `{}`})"

function renderPage() {
  switch (state.page) {
    case 'home': return renderHome();
    case 'category': return renderCategory();
    case 'product': return renderProductDetail();
    case 'cart': return renderCart();
    case 'checkout': return renderCheckout();
    case 'profile': return renderProfile();
    case 'orders': return renderOrders();
    default: return renderHome();
  }
}

            ${added ? ic('check') : ic('cart')}
          </button>
        </div>
      </div>
    </div>
  `;

function renderCategory() {
  const cat = state.category || 'all';
  const catName = categories.find(c => c.id === cat)?.name || 'Barcha mahsulotlar';
  let filtered = [...products];
  if (cat === 'sale') filtered = filtered.filter(p => p.badge === 'Aksiya' || p.oldPrice);
  else if (cat !== 'all') filtered = filtered.filter(p => p.category === cat);
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q));
  }
  filtered = filtered.filter(p => p.price >= 0 && p.price <= state.priceRange);
  switch (state.sort) {
    case 'price-asc': filtered.sort((a,b) => a.price - b.price); break;
    case 'price-desc': filtered.sort((a,b) => b.price - a.price); break;
    case 'rating': filtered.sort((a,b) => b.rating - a.rating); break;
    case 'new': filtered.sort((a,b) => (b.badge==='Yangi'?1:0)-(a.badge==='Yangi'?1:0)); break;
    default: filtered.sort((a,b) => b.reviewCount - a.reviewCount);
  }

  const filterPanel = `
    <div class="space-y-6">
      <div>

          ${categories.map(c=>`

          `).join('')}
        </div>
      </div>
      <div>
        <h3 class="text-sm font-semibold text-gray-900 dark:text-white mb-3">Narx oralig'i</h3>
        <input type="range" min="0" max="5000000" step="50000" value="${state.priceRange}" oninput="state.priceRange=+this.value; document.getElementById('price-val').textContent=new Intl.NumberFormat('uz-UZ').format(state.priceRange)+' so\'m'; render()" class="w-full accent-blue-600" />
        <div class="flex items-center justify-between text-xs text-gray-600 dark:text-gray-400 mt-2"><span>0 so'm</span><span id="price-val">${new Intl.NumberFormat('uz-UZ').format(state.priceRange)} so'm</span></div>

  return `

      <div class="flex items-center justify-between mb-5">

        <div class="flex items-center gap-2">
          <select onchange="state.sort=this.value; render()" class="appearance-none h-10 pl-4 pr-9 rounded-xl bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 text-sm text-gray-900 dark:text-white cursor-pointer focus:outline-none focus:border-blue-500">

        </div>
      </div>

        <div class="flex items-center gap-2 ${state.checkoutStep==='info'?'text-blue-600 dark:text-blue-400':'text-gray-400'}"><div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${state.checkoutStep==='info'?'bg-blue-600 text-white':'bg-gray-200 dark:bg-zinc-800 text-gray-500'}">1</div><span class="text-sm font-medium">Ma'lumot</span></div>
        <div class="flex-1 h-0.5 bg-gray-200 dark:bg-zinc-800"></div>
        <div class="flex items-center gap-2 ${state.checkoutStep==='payment'?'text-blue-600 dark:text-blue-400':'text-gray-400'}"><div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${state.checkoutStep==='payment'?'bg-blue-600 text-white':'bg-gray-200 dark:bg-zinc-800 text-gray-500'}">2</div><span class="text-sm font-medium">To'lov</span></div>
      </div>
      <form onsubmit="event.preventDefault(); ${state.checkoutStep==='info'?"state.checkoutStep='payment'; render()":"state.checkoutStep='success'; state.cart=[]; saveState(); render()"}" class="grid lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-4">
          ${state.checkoutStep === 'info' ? `
            <div class="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-5 space-y-4">
              <h2 class="text-lg font-bold text-gray-900 dark:text-white">Yetkazib berish ma'lumotlari</h2>
              <div class="grid sm:grid-cols-2 gap-4">
                <div class="relative">${ic('user')}<input required type="text" placeholder="Ism familiyangiz" class="${inputCls}" /></div>
                <div class="relative">${ic('phone')}<input required type="tel" placeholder="+998 90 123 45 67" class="${inputCls}" /></div>
              </div>
              <div class="relative">${ic('pin')}<input required type="text" placeholder="Manzil (ko'cha, uy, kvartira)" class="${inputCls}" /></div>
              <div class="relative">${ic('truck')}<select class="${inputCls} cursor-pointer"><option>Toshkent</option><option>Samarqand</option><option>Buxoro</option><option>Andijon</option><option>Farg'ona</option></select></div>
              <textarea placeholder="Qo'shimcha izoh (ixtiyoriy)" rows="3" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 resize-none"></textarea>
            </div>
          ` : `
            <div class="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-5 space-y-3">
              <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-2">To'lov usuli</h2>
              ${[{id:'cash',icon:'banknote',l:'Naqd pul',d:"Yetkazib berishda to'lash"},{id:'card',icon:'creditCard',l:'Karta orqali',d:'Yetkazib berishda terminal orqali'},{id:'online',icon:'wallet',l:"Online to'lov",d:'Click / Payme orqali'}].map(m=>`
                <button type="button" onclick="state.paymentMethod='${m.id}'; render()" class="w-full flex items-center gap-3 p-4 rounded-xl border-2 transition-all text-left ${state.paymentMethod===m.id?'border-blue-600 bg-blue-50 dark:bg-blue-900/20':'border-gray-200 dark:border-zinc-800 hover:border-gray-300'}">
                  <span class="${state.paymentMethod===m.id?'text-blue-600 dark:text-blue-400':'text-gray-400'}">${ic(m.icon)}</span>
                  <div class="flex-1"><div class="text-sm font-semibold text-gray-900 dark:text-white">${m.l}</div><div class="text-xs text-gray-500 dark:text-gray-400">${m.d}</div></div>
                  <div class="w-5 h-5 rounded-full border-2 ${state.paymentMethod===m.id?'border-blue-600 bg-blue-600':'border-gray-300'}">${state.paymentMethod===m.id?'<span class="text-white">'+ic('check')+'</span>':''}</div>
                </button>
              `).join('')}
            </div>
          `}
          <button type="submit" class="w-full h-12 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm transition-colors active:scale-95">${state.checkoutStep==='info'?"Davom etish":"Buyurtmani tasdiqlash"}</button>
        </div>
        <div class="lg:col-span-1"><div class="sticky top-[130px] bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-5 space-y-4">
          <h2 class="text-lg font-bold text-gray-900 dark:text-white">Buyurtmangiz</h2>
          <div class="space-y-3 max-h-64 overflow-y-auto">
            ${state.cart.map(item=>`
              <div class="flex gap-3"><div class="w-14 h-14 rounded-lg overflow-hidden bg-gray-50 dark:bg-zinc-800 shrink-0"><img src="${item.product.image}" class="w-full h-full object-cover" /></div>
                <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-900 dark:text-white line-clamp-1">${item.product.name}</div><div class="text-xs text-gray-500 dark:text-gray-400">${item.quantity} × ${fmt(item.product.price)}</div></div>
                <div class="text-sm font-semibold text-gray-900 dark:text-white shrink-0">${fmt(item.product.price * item.quantity)}</div>
              </div>
            `).join('')}
          </div>
          <div class="pt-4 border-t border-gray-100 dark:border-zinc-800 space-y-2 text-sm">
            <div class="flex justify-between"><span class="text-gray-600 dark:text-gray-400">Mahsulotlar</span><span class="font-medium text-gray-900 dark:text-white">${fmt(ct)}</span></div>
            <div class="flex justify-between"><span class="text-gray-600 dark:text-gray-400">Yetkazib berish</span><span class="font-medium ${ship===0?'text-emerald-600':'text-gray-900 dark:text-white'}">${ship===0?'Bepul':fmt(ship)}</span></div>
            <div class="flex justify-between pt-2 border-t border-gray-100 dark:border-zinc-800"><span class="text-base font-semibold text-gray-900 dark:text-white">Jami</span><span class="text-lg font-bold text-gray-900 dark:text-white">${fmt(total)}</span></div>
          </div>
        </div></div>
      </form>
    </div>
  `;
}

function renderProfile() {
  const wlProducts = products.filter(p => state.wishlist.includes(p.id));
  const stats = [{l:'Buyurtmalar',v:'12',i:'package'},{l:'Sevimlilar',v:state.wishlist.length.toString(),i:'heart'},{l:"Sevimli kategoriya",v:'Audio',i:'settings'}];
  const menuItems = [{i:'package',l:'Buyurtmalarim',d:'Barcha buyurtmalaringiz tarixi',p:'orders'},{i:'pin',l:'Mening manzillarim',d:'Saqlangan manzillar',p:'profile'},{i:'creditCard',l:"To'lov kartalari",d:'Kartalar boshqaruvi',p:'profile'},{i:'bell',l:'Bildirishnomalar',d:'Push xabarnoma sozlamalari',p:'profile'},{i:'settings',l:'Sozlamalar',d:'Profil va xavfsizlik',p:'profile'}];
  return `
    <div class="pb-8 space-y-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Profil</h1>
      <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-6 text-white relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-40 h-40 rounded-full bg-white/10"></div>
        <div class="relative flex items-center gap-4">
          <div class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center text-2xl font-bold">AK</div>
          <div class="flex-1"><h2 class="text-xl font-bold">Aziz Karimov</h2><p class="text-blue-100 text-sm">+998 90 123 45 67</p><p class="text-blue-200 text-xs mt-0.5">aziz.karimov@gmail.com</p></div>
          <button class="px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 text-sm font-medium transition-colors">Tahrirlash</button>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        ${stats.map(s=>`<div class="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-4 text-center">
          <div class="w-10 h-10 rounded-xl bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-600 dark:text-blue-400 mx-auto mb-2">${ic(s.i)}</div>
          <div class="text-xl font-bold text-gray-900 dark:text-white">${s.v}</div><div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">${s.l}</div>
        </div>`).join('')}
      </div>
      <div class="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 overflow-hidden">
        ${menuItems.map((item,i)=>`<button onclick="navigate('${item.p}')" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 dark:hover:bg-zinc-800/50 transition-colors text-left ${i!==menuItems.length-1?'border-b border-gray-100 dark:border-zinc-800':''}">
          <div class="w-10 h-10 rounded-xl bg-gray-50 dark:bg-zinc-800 flex items-center justify-center text-gray-600 dark:text-gray-300">${ic(item.i)}</div>
          <div class="flex-1"><div class="text-sm font-semibold text-gray-900 dark:text-white">${item.l}</div><div class="text-xs text-gray-500 dark:text-gray-400">${item.d}</div></div>
          ${ic('chevronRight')}
        </button>`).join('')}
      </div>
      <button class="w-full flex items-center justify-center gap-2 p-4 rounded-2xl border border-red-200 dark:border-red-900/30 text-red-600 dark:text-red-400 text-sm font-semibold hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors">${ic('logout')} Tizimdan chiqish</button>
      ${wlProducts.length > 0 ? `
        <section><div class="flex items-center justify-between mb-4"><h2 class="text-xl font-bold text-gray-900 dark:text-white">Sevimli mahsulotlar</h2><span class="text-sm text-gray-500 dark:text-gray-400">${wlProducts.length} ta</span></div>
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">${wlProducts.map(p=>productCard(p)).join('')}</div>
        </section>
      ` : ''}
    </div>
  `;
}

function renderOrders() {
  const statusCfg = {
    'Yetkazilmoqda': {c:'text-blue-600 dark:text-blue-400',b:'bg-blue-50 dark:bg-blue-900/20',i:'truck'},
    'Yetkazildi': {c:'text-amber-600 dark:text-amber-400',b:'bg-amber-50 dark:bg-amber-900/20',i:'clock'},
    'Qabul qilindi': {c:'text-emerald-600 dark:text-emerald-400',b:'bg-emerald-50 dark:bg-emerald-900/20',i:'check'},
    'Bekor qilindi': {c:'text-red-600 dark:text-red-400',b:'bg-red-50 dark:bg-red-900/20',i:'xCircle'},
  };
  return `
    <div class="pb-8 space-y-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Buyurtmalarim</h1>
      ${ordersData.length === 0 ? `
        <div class="flex flex-col items-center justify-center py-20 text-center">
          <div class="w-20 h-20 rounded-full bg-gray-100 dark:bg-zinc-800 flex items-center justify-center mb-4 text-gray-300 dark:text-gray-600">${ic('package')}</div>
          <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">Buyurtmalar yo'q</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">Hali buyurtma bermagansiz</p>
          <button onclick="navigate('category',{category:'all'})" class="px-5 py-3 rounded-xl bg-blue-600 text-white text-sm font-semibold">Xarid qilish</button>
        </div>
      ` : `
        <div class="space-y-4">
          ${ordersData.map(o=>{const cfg=statusCfg[o.status];return `
            <div class="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 overflow-hidden">
              <div class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-zinc-800">
                <div><div class="text-sm font-bold text-gray-900 dark:text-white">${o.id}</div><div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">${o.date}</div></div>
                <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold ${cfg.b} ${cfg.c}">${ic(cfg.i)} ${o.status}</div>
              </div>
              <div class="p-4 space-y-3">
                ${o.items.map((it,i)=>`<div class="flex gap-3 cursor-pointer" onclick="navigate('product',{product:products.find(x=>x.id===${it.product.id})})">
                  <div class="w-16 h-16 rounded-xl overflow-hidden bg-gray-50 dark:bg-zinc-800 shrink-0"><img src="${it.product.image}" class="w-full h-full object-cover" /></div>
                  <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-900 dark:text-white line-clamp-1">${it.product.name}</div><div class="text-xs text-gray-500 dark:text-gray-400 mt-1">${it.quantity} dona × ${fmt(it.product.price)}</div></div>
                  <div class="text-sm font-semibold text-gray-900 dark:text-white shrink-0">${fmt(it.product.price * it.quantity)}</div>
                </div>`).join('')}
              </div>
              <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-zinc-800/50 border-t border-gray-100 dark:border-zinc-800">
                <div><div class="text-xs text-gray-500 dark:text-gray-400">Jami</div><div class="text-base font-bold text-gray-900 dark:text-white">${fmt(o.total)}</div></div>
                <button class="flex items-center gap-1 text-sm text-blue-600 dark:text-blue-400 font-medium hover:gap-2 transition-all">Batafsil ${ic('chevronRight')}</button>
              </div>
            </div>
          `;}).join('')}
        </div>
      `}
    </div>
  `;
}

// ===== EVENTS =====
function attachEvents() {}

// ===== INIT =====
loadState();
render();
</script>
</body>
