<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarket — Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandGold: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300">

    <header class="sticky top-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md shadow-sm z-50 px-4 py-3 flex justify-between items-center border-b border-gray-100 dark:border-gray-800">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight text-black dark:text-white">iMarket</h1>
            <p class="text-[10px] text-gray-400 font-medium">Sifatli aksessuarlar makoni</p>
        </div>
        <button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-lg active:scale-90 transition shadow-inner">🌓</button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 pb-32">
        
        <div class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white p-6 rounded-2xl flex items-center justify-between shadow-xl relative overflow-hidden group">
            <div class="space-y-1.5 z-10">
                <span class="bg-amber-500 text-black text-[9px] font-extrabold uppercase px-2 py-0.5 rounded-md tracking-wider">Yangi Kolleksiya</span>
                <h2 class="text-lg font-bold leading-tight tracking-wide">Sifatli aksessuarlar<br>bitta joyda.</h2>
                <p class="text-[11px] text-gray-400">Original mahsulotlar, tez yetkazish.</p>
                <button class="bg-white text-black text-xs font-bold px-4 py-2 rounded-xl mt-2 active:scale-95 transition shadow-lg">Xaridni boshlash →</button>
            </div>
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" class="w-24 h-24 object-cover rounded-2xl shadow-2xl z-10 transform group-hover:scale-105 transition duration-300">
            <div class="absolute -right-6 -bottom-6 w-24 h-24 bg-amber-500/10 rounded-full blur-xl"></div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-extrabold text-sm text-gray-400 uppercase tracking-wider">Kategoriyalar</h3>
                <span class="text-xs font-bold text-amber-500 cursor-pointer hover:underline">Barchasi ko'rish →</span>
            </div>
            <div class="grid grid-cols-4 gap-2.5 text-center text-xs font-bold">
                <div onclick="filterCategory('all')" class="p-3 bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-95 transition">📦<p class="mt-1 text-[10px] text-gray-500">Barchasi</p></div>
                <div onclick="filterCategory('audio')" class="p-3 bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-95 transition">🎧<p class="mt-1 text-[10px] text-gray-500">Audio</p></div>
                <div onclick="filterCategory('smart')" class="p-3 bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-95 transition">⌚<p class="mt-1 text-[10px] text-gray-500">Smart</p></div>
                <div onclick="filterCategory('case')" class="p-3 bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-95 transition">📱<p class="mt-1 text-[10px] text-gray-500">G'iloflar</p></div>
            </div>
        </div>

        <div>
            <h3 class="font-extrabold text-sm text-gray-400 uppercase tracking-wider mb-3">Mashhur Mahsulotlar</h3>
            <div id="products-grid" class="grid grid-cols-2 gap-3.5">
                <div class="col-span-2 text-center text-gray-400 py-4 text-xs">Mahsulotlar yuklanmoqda...</div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md p-4 border-t border-gray-100 dark:border-gray-800 max-w-md mx-auto flex justify-between items-center shadow-2xl z-50 rounded-t-2xl">
        <div>
            <p class="text-[10px] text-gray-400 uppercase font-extrabold tracking-widest">Savatcha summasi:</p>
            <p id="total-price" class="font-black text-xl text-amber-500 tracking-tight">0 so'm</p>
        </div>
        <button id="order-btn" onclick="sendOrder()" class="bg-black dark:bg-white dark:text-black text-white px-6 py-3.5 rounded-xl font-black text-xs tracking-widest active:scale-95 transition opacity-40 cursor-not-allowed uppercase" disabled>
            Buyurtma berish →
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        if (tg.colorScheme === 'dark') {
            document.documentElement.classList.add('dark');
        }

        let allProducts = [];
        let cart = [];
        let total = 0;

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch (err) {
                console.error("Yuklashda xatolik:", err);
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white dark:bg-gray-900 p-3.5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex flex-col justify-between hover:shadow-md transition duration-200">
                        <div class="relative overflow-hidden rounded-xl mb-2">
                            <img src="${p.image}" class="w-full h-28 object-cover rounded-xl transform hover:scale-105 transition duration-300">
                        </div>
                        <h4 class="font-bold text-xs truncate text-gray-800 dark:text-gray-200">${p.name}</h4>
                        <p class="text-amber-500 text-xs font-black my-1">${p.price.toLocaleString()} so'm</p>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="w-full bg-gray-900 text-white dark:bg-white dark:text-gray-900 text-[11px] py-2.5 rounded-xl font-extrabold mt-1.5 active:scale-95 transition shadow-sm">+ Savatchaga</button>
                    </div>
                `;
            });
        }

        function filterCategory(cat) {
            if (cat === 'all') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                renderProducts(filtered);
            }
        }

        function addToCart(name, price) {
            cart.push({ name: name, price: price });
            total += price;
            document.getElementById('total-price').innerText = total.toLocaleString() + " so'm";
            
            const orderBtn = document.getElementById('order-btn');
            orderBtn.disabled = false;
            orderBtn.classList.remove('opacity-40', 'cursor-not-allowed');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function sendOrder() {
            if (cart.length === 0) return;
            const orderData = { items: cart, total_price: total };
            tg.sendData(JSON.stringify(orderData));
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
